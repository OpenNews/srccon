        <div class="page-container">

              Home{% endif %}</a

          {% endif %}
          <a

            href="{% if page.logo_link %}{{ page.logo_link }}{% else %}/{% endif %}"
          >
            <img
              src="{% if page.logo %}{{ page.logo }}{% else %}/media/img/srccon_logo_angle_512.png{% endif %}"
              alt="SRCCON Logo"
            />
          </a>
        </div>
      </nav>
