name: Weekly Health Check

on:
  schedule:
    # Every Monday at noon UTC
    - cron: '0 12 * * 1'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Check for outdated dependencies
        run: |
          echo "Checking for outdated dependencies..."
          bundle exec rake outdated:direct || true

      - name: Build Jekyll site
        run: bundle exec rake build

      - name: Run validation checks
        run: bundle exec rake check

      - name: Run all tests
        run: bundle exec rake test:all

      - name: Report success
        if: success()
        run: |
          echo "✅ Weekly health check passed!"
          echo "All dependencies are up to date and the site builds successfully."

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Weekly Health Check Failed';
            const body = `The weekly health check workflow has failed. This could indicate:
            
            - Outdated dependencies causing build failures
            - Breaking changes in gem updates
            - Configuration errors
            - Template validation issues
            
            **Workflow run:** ${context.payload.repository.html_url}/actions/runs/${context.runId}
            
            Please investigate and resolve the issues.`;
            
            // Check if an issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-check'
            });
            
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['health-check', 'bug']
              });
            }
