<div class="live hidden">
  <h2 id="live-leader">Right now at SRCCON</h2>
  <table>
    {% for session in site.data.schedule %}
    <tr class="hidden live-{{ session.timeblock }}">
      <td class="session-time">{{ session.time }}</td>
      <td>
        <a
          class="session-title"
          href="{{ page.current_srccon_sked_link }}/#_session-{{ session.id }}"
          >{{ session.title }}</a
        >{% if session.transcription != "" %}<br /><a
          class="session-transcript"
          href="https://upword.ly/view?user=srccon2019&job=srccon2019-{{ session.id }}"
          >Live transcript</a
        >{% endif %}
      </td>
    </tr>
    {% endfor %}
  </table>

  <a class="context-link" href="{{ page.current_srccon_sked_link }}"
    >See the full 2026 SRCCON schedule</a
  >
</div>
